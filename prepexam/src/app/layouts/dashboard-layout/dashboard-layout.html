<div class="dashboard-layout" [class.sidebar-collapsed]="isSidebarCollapsed">
  <div class="backdrop" *ngIf="isMobileMenuOpen || isProfilePanelOpen || isNotificationsPanelOpen" (click)="closeAllPanels()"></div>

  <aside class="sidebar" [class.mobile-open]="isMobileMenuOpen" [class.collapsed]="isSidebarCollapsed">
    <app-sidebar
      [collapsed]="isSidebarCollapsed"
      [mobileOpen]="isMobileMenuOpen"
      (toggleCollapse)="toggleSidebar()"
      (closeMobileMenu)="closeAllPanels()"
    ></app-sidebar>
  </aside>

  <div class="main-wrapper">
    <header class="header">
      <app-header
        [isSidebarCollapsed]="isSidebarCollapsed"
        [isProfileOpen]="isProfilePanelOpen"
        [isNotificationsOpen]="isNotificationsPanelOpen"
        (toggleSidebar)="toggleSidebar()"
        (toggleNotifications)="toggleNotifications()"
        (toggleProfile)="toggleProfile()"
      ></app-header>
    </header>

    <main class="page-content">
      <router-outlet></router-outlet>
    </main>

    <div class="ai-motivation-bot" [class.bubble-open]="isBubbleOpen" [class.fullscreen-doubt]="copilotMode === 'doubt' && isBubbleOpen">
      
      <div class="bot-speech-bubble" *ngIf="isBubbleOpen">
        <div class="mode-container" *ngIf="copilotMode === 'motivate'">
          <div class="bubble-header">
            <span><i class="fas fa-sparkles"></i> AI Co-Pilot</span>
            <button type="button" class="close-bubble-btn" (click)="closeBubble($event)">
              <i class="fas fa-times"></i>
            </button>
          </div>

          <p class="bot-message">
            {{ displayedMessage }}<span class="typing-cursor" *ngIf="isTyping">|</span>
          </p>
          
          <div class="motivation-actions-row">
            <button type="button" class="switch-to-doubt-shortcut" (click)="switchCopilotMode('doubt')">
              Ask a Doubt <i class="fas fa-comment-alt-question"></i>
            </button>
            <button type="button" class="action-mode-btn" (click)="generateNewQuote($event)" [disabled]="isTyping">
              Next Advice <i class="fas fa-arrow-right"></i>
            </button>
          </div>
        </div>

        <div class="subcomponent-wrapper" *ngIf="copilotMode === 'doubt'">
          <app-ai-chat 
            (back)="goBackToMotivation()" 
            (close)="closeBubble()">
          </app-ai-chat>
        </div>
      </div>

      <button class="bot-avatar-trigger" type="button" (click)="toggleBubble()" *ngIf="!(copilotMode === 'doubt' && isBubbleOpen)">
        <div class="pulse-ring"></div>
        <i class="fas fa-robot"></i>
      </button>
    </div>

    <app-mobile-menu *ngIf="!isProfilePanelOpen && !isNotificationsPanelOpen && !isMobileMenuOpen"></app-mobile-menu>
  </div>
</div>
