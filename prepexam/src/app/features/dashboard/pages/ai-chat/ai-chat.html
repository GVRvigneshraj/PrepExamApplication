<div class="whatsapp-chat-frame">
  
  <main class="message-stream-body" #scrollContainer>
    <div class="stream-inner-constraint">
      
      <div *ngFor="let msg of messages()" class="msg-row" [ngClass]="msg.sender">
        <div class="chat-bubble">
          <p class="msg-text-content" [innerHTML]="msg.text"></p>
          <span class="bubble-timestamp">
            {{ formatMessageTime() }} 
            <span *ngIf="msg.sender === 'user'" class="read-ticks">✓✓</span>
          </span>
        </div>
      </div>

      <div *ngIf="isAiThinking()" class="msg-row ai thinking-state">
        <div class="chat-bubble">
          <div class="skeleton-wave-dots">
            <span class="pulse-dot"></span>
            <span class="pulse-dot"></span>
            <span class="pulse-dot"></span>
          </div>
        </div>
      </div>

    </div>
  </main>

  <footer class="chat-action-footer-dock">
    <div class="footer-input-row-container">
      <textarea 
        #chatInput
        rows="1" 
        placeholder="Type a message..." 
        [ngModel]="userInputText()" 
        (ngModelChange)="userInputText.set($event)"
        (keydown.enter)="handleKeydown($any($event))">
      </textarea>
      
      <button 
        class="send-submit-action-btn" 
        [disabled]="!userInputText().trim() || isAiThinking()"
        (click)="submitUserMessage()">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
  </footer>

</div>
