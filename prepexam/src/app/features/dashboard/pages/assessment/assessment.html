<div class="container-root">

  <h1 class="main-heading">Select Subject</h1>
  <p class="sub-heading">Choose a subject to start assessment</p>

  <div class="subject-grid">
    <div
      class="subject-card"
      *ngFor="let sub of subjects"
      [class.active-card]="selectedSubject === sub.name"
      (click)="selectSubject(sub.name)">

      <div class="check-indicator" *ngIf="selectedSubject === sub.name">
        <i class="fas fa-check"></i>
      </div>

      <div class="icon-wrapper" [style.color]="sub.color" [style.background]="sub.color + '12'">
        <i [class]="sub.icon"></i>
      </div>
      <div class="subject-label">{{ sub.name }}</div>
    </div>
  </div>

  <div class="chapters-section">
    <div class="section-meta">
      <h2 class="active-subject-title">{{ selectedSubject }}</h2>
      <div class="chapters-count">Total Chapters: {{ currentChapters.length }}</div>
    </div>

    <div class="chapter-stack">
      <div
        class="chapter-row-card"
        *ngFor="let ch of currentChapters"
        [class.is-expanded]="ch.isExpanded"
        [class.is-locked]="!ch.unlocked">

        <div class="card-header" (click)="toggleChapter(ch)">
          <div class="header-left">
            <span class="chapter-badge-num" [class.locked-num]="!ch.unlocked">
              <i class="fas fa-lock" *ngIf="!ch.unlocked"></i>
              <span *ngIf="ch.unlocked">{{ ch.id }}</span>
            </span>
            <span class="chapter-title-text">{{ ch.name }}</span>
          </div>

          <div class="header-right" *ngIf="ch.unlocked">
            <span class="percentage-label" [style.color]="getProgressColor(ch.progress)">{{ ch.progress }}%</span>

            <div class="radial-ring">
              <svg viewBox="0 0 36 36" class="circular-svg">
                <path class="ring-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                <path class="ring-fill"
                      [style.stroke]="getProgressColor(ch.progress)"
                      [attr.stroke-dasharray]="ch.progress + ', 100'"
                      d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
              </svg>
            </div>
            <i class="fas fa-chevron-down arrow-toggle"></i>
          </div>
        </div>

        <div class="card-body-expansion" *ngIf="ch.isExpanded && ch.unlocked">

          <div class="sub-item-row">
            <div class="item-left">
              <div class="sub-icon blue-theme"><i class="fas fa-book-open"></i></div>
              <div class="meta-block">
                <div class="meta-title">Topics</div>
                <div class="meta-desc">{{ ch.topicsCount }} Core Topics Covered</div>
              </div>
            </div>
            <button class="action-btn outlines">Start Lesson <i class="fas fa-play-circle"></i></button>
          </div>

          <div class="sub-item-row no-border">
            <div class="item-left">
              <div class="sub-icon green-theme"><i class="fas fa-clipboard-list"></i></div>
              <div class="meta-block">
                <div class="meta-title">MCQ Assessment</div>
                <div class="meta-desc">{{ ch.questionsCount }} Questions Setup</div>
              </div>
            </div>
            <button class="action-btn success-solid" (click)="launchExam(ch, $event)">
              Start MCQ <span class="badge-count">{{ ch.questionsCount }}</span>
            </button>
          </div>

        </div>

      </div>
    </div>
  </div>
</div>

<app-test-page
  *ngIf="isExamActive && activeExamChapter"
  [chapterData]="activeExamChapter"
  (onComplete)="onExamFinished($event)">
</app-test-page>
