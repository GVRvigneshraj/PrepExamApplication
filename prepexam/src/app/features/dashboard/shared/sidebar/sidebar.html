<aside class="sidebar-shell" [class.collapsed]="collapsed" [class.mobile-open]="mobileOpen">
    <div class="sidebar-header">
        <div class="logo">
            <svg width="36" height="36" viewBox="0 0 48 48" fill="none">
                <rect width="48" height="48" rx="14" fill="#6C5CE7" />
                <path d="M24 11L33 28H15L24 11Z" fill="white" opacity="0.95" />
                <circle cx="24" cy="34" r="4.5" fill="white" opacity="0.95" />
            </svg>
            <span class="logo-text" *ngIf="!collapsed">ExamPrepPro</span>
        </div>
        <button class="collapse-btn" type="button" (click)="onToggleCollapse()">
            <i class="fas" [ngClass]="collapsed ? 'fa-chevron-right' : 'fa-chevron-left'"></i>
        </button>
    </div>

    <nav class="sidebar-nav">

        <div class="nav-section">

            <span class="nav-section-title" *ngIf="!collapsed">
                MAIN MENU
            </span>

            <a [routerLink]="['/', exam, 'dashboard']" routerLinkActive="active"
                [routerLinkActiveOptions]="{ exact: true }" class="nav-item" [class.compact]="collapsed">

                <span class="nav-icon">
                   <i class="fas fa-house"></i>
                </span>

                <span class="nav-label" *ngIf="!collapsed">
                    Dashboard
                </span>

            </a>

            <a [routerLink]="['/', exam, 'assessment']" routerLinkActive="active" class="nav-item"
                [class.compact]="collapsed">

                <span class="nav-icon">
                    <i class="fas fa-file-alt"></i>
                </span>

                <span class="nav-label" *ngIf="!collapsed">
                    Assessment
                </span>

            </a>
            <a routerLink="/neet/ai-chat" routerLinkActive="active" class="nav-item" [class.compact]="collapsed">

                <span class="nav-icon">
                    <i class="fas fa-robot"></i>
                </span>

                <span class="nav-label" *ngIf="!collapsed">
                    AI Chat
                </span>
            </a>
            <a [routerLink]="['/', exam, 'leaderboard']" routerLinkActive="active" class="nav-item"
                [class.compact]="collapsed">

                <span class="nav-icon">
                    <i class="fas fa-trophy"></i>
                </span>

                <span class="nav-label" *ngIf="!collapsed">
                    Leaderboard
                </span>

            </a>

            <a [routerLink]="['/', exam, 'reports']" routerLinkActive="active" class="nav-item"
                [class.compact]="collapsed">

                <span class="nav-icon">
                    <i class="fas fa-chart-line"></i>
                </span>

                <span class="nav-label" *ngIf="!collapsed">
                    Reports
                </span>

            </a>

        </div>

    </nav>
    <div class="sidebar-footer">
        <div class="upgrade-card" [class.compact]="collapsed">
            <div class="upgrade-icon"><i class="fas fa-crown"></i></div>
            <div class="upgrade-text" *ngIf="!collapsed">
                <h4>Upgrade to Pro</h4>
                <p>Unlock all features & mock tests</p>
            </div>
            <button class="upgrade-btn" type="button">{{ collapsed ? 'Pro' : 'Upgrade' }}</button>
        </div>
    </div>
</aside>
