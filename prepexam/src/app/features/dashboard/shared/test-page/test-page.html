<div class="exam-header">
  <div class="header-left">
    <span class="category-tag">{{ subtitleLabel }}</span>
    <h2>{{ testTitle }}</h2>
  </div>
  <div class="header-right">
    <span class="progress-indicator">
      Question <strong>{{ currentIndex + 1 }}</strong> of {{ activeQuestions.length }}
    </span>
  </div>
</div>

<div class="exam-workspace-layout" *ngIf="currentQuestion">

  <main class="question-canvas">
    <div class="question-card">
      <span class="q-number-badge">Question {{ currentIndex + 1 }}</span>
      <p class="question-text">{{ currentQuestion.text }}</p>

      <div class="options-vertical-group">
        <div
          class="option-row"
          *ngFor="let option of currentQuestion.options; let idx = index"
          [class.is-selected]="currentQuestion.selectedAnswer === idx"
          (click)="selectOption(idx)">
          <div class="radio-ring-indicator">
            <div class="radio-inner-dot"></div>
          </div>
          <span class="option-label-string">{{ option }}</span>
        </div>
      </div>
    </div>
  </main>

  <aside class="navigation-sidebar">
    <h3>Question Matrix</h3>
    <div class="palette-grid">
      <button
        type="button"
        class="palette-node"
        *ngFor="let q of activeQuestions; let idx = index"
        [class.current]="currentIndex === idx"
        [class.answered]="q.selectedAnswer !== undefined"
        (click)="jumpToQuestion(idx)">
        {{ idx + 1 }}
      </button>
    </div>
  </aside>

</div>

<div class="exam-action-footer">
  <button
    type="button"
    class="nav-btn"
    [disabled]="currentIndex === 0"
    (click)="goToPrev()">
    <i class="fas fa-chevron-left"></i> Previous
  </button>

  <button
    type="button"
    class="submit-action-btn"
    *ngIf="currentIndex === activeQuestions.length - 1"
    (click)="submitExam()">
    Submit Evaluation
  </button>

  <button
    type="button"
    class="nav-btn next-accent"
    *ngIf="currentIndex < activeQuestions.length - 1"
    (click)="goToNext()">
    Next <i class="fas fa-chevron-right"></i>
  </button>
</div>
