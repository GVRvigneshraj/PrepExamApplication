<div class="onboarding-container">
  <div class="card-wrapper fade-in">

    <!-- BRAND HEADER BRANDING DESIGN (Matches log 1.png & log 2.png) -->
    <div class="header-section text-center">
      <div class="brand-logo-container">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="brand-cap-icon"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c0 2 2 3 6 3s6-1 6-3v-5"/></svg>
        <span class="brand-name-text">PrepExam</span>
      </div>
      <p class="sub-heading-caption">Your AI-powered exam preparation companion</p>
    </div>

    <!-- MAIN REGISTRATION PORTAL BOX -->
    <div class="login-surface-card">
      <h1 class="portal-main-title">Create Account</h1>
      <p class="portal-sub-title">Join us to start your smart preparation</p>

      <form [formGroup]="registerForm" (ngSubmit)="$event.preventDefault(); handleAction()">

        <!-- STAGE 1: ACCOUNT DETAILS INFORMATION COLLECTOR -->
        <div *ngIf="!isOtpStage" class="details-grid-wrapper fade-in">

          <!-- FULL NAME -->
          <div class="form-input-group">
            <label class="field-label-text">FULL NAME</label>
            <input type="text" formControlName="fullName" placeholder="Enter full name" class="standard-text-input" />
          </div>

          <!-- DATE OF BIRTH -->
          <div class="form-input-group">
            <label class="field-label-text">DATE OF BIRTH</label>
            <input type="date" formControlName="dob" class="standard-text-input" />
          </div>

          <!-- EMAIL ADDRESS -->
          <div class="form-input-group">
            <label class="field-label-text">EMAIL ADDRESS</label>
            <input type="email" formControlName="email" placeholder="example@domain.com" class="standard-text-input" />
          </div>

          <!-- GENDER SELECTION -->
          <div class="form-input-group">
            <label class="field-label-text">GENDER</label>
            <select formControlName="gender" class="standard-text-input custom-select">
              <option value="" disabled selected hidden>Select Gender</option>
              <option value="male">Male</option>
              <option value="female">Female</option>
              <option value="other">Other</option>
            </select>
          </div>

          <!-- CITY -->
          <div class="form-input-group">
            <label class="field-label-text">CITY</label>
            <input type="text" formControlName="city" placeholder="Enter your city" class="standard-text-input" />
          </div>

          <!-- MOBILE NUMBER ENTRY BLOCK -->
          <div class="form-input-group">
            <label class="field-label-text">MOBILE NUMBER</label>
            <div class="mobile-input-row">
              <div class="prefix-country-box">+91</div>
              <input
                type="tel"
                formControlName="mobileNumber"
                placeholder="10–digit number"
                maxlength="10"
                class="mobile-text-input"
              />
            </div>
          </div>

        </div>

        <!-- STAGE 2: OTP VERIFICATION DIGITS BLOCKS (Triggers after clicking Continue) -->
        <div *ngIf="isOtpStage" class="form-input-group otp-section-wrapper fade-in">
          <p class="verification-helper-text">
            We have sent a verification code to <strong>+91 {{ registerForm.get('mobileNumber')?.value }}</strong>
          </p>

          <label class="field-label-text text-center">ENTER OTP</label>
          <div class="otp-fields-row">
            <div *ngFor="let digit of otpDigits.controls; let i = index" class="otp-box-cell">
              <input
                [id]="'otp-' + i"
                type="text"
                maxlength="1"
                [formControl]="$any(digit)"
                (input)="onOtpInput($event, i)"
                (keydown)="onOtpKeyDown($event, i)"
                class="otp-digit-field"
                autocomplete="one-time-code"
                inputmode="numeric"
              />
            </div>
          </div>
          <p class="demo-otp-helper">Demo OTP: {{ demoOtpHint }}</p>

          <div class="text-center">
            <button type="button" class="back-to-details-btn" (click)="isOtpStage = false">
              ← Edit details
            </button>
          </div>
        </div>

        <!-- CALL TO ACTIONS BUTTONS -->
        <div class="action-footer-wrapper">
          <button
            type="submit"
            class="btn btn-modern-primary full-width"
            [disabled]="(!isOtpStage && !isDetailsFormValid()) || (isOtpStage && !registerForm.valid) || isSubmitting"
          >
            <!-- Stage 1 View Label (Matching layout style of log 2.png) -->
            <ng-container *ngIf="!isOtpStage">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="btn-icon-left"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
              <span>Continue & Verify</span>
            </ng-container>

            <!-- Stage 2 View Label (Matching layout style of log 1.png) -->
            <ng-container *ngIf="isOtpStage">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="btn-icon-left"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 14 14"/></svg>
              <span>{{ isSubmitting ? 'Registering...' : 'Verify & Sign Up' }}</span>
            </ng-container>
          </button>
        </div>

      </form>

      <!-- ALTERNATIVE ROUTE LINKS MAPS -->
      <div class="alternate-action-footer">
        <span class="alt-label">Already have an account?</span>
        <a routerLink="/login" class="alt-link-anchor">Sign In</a>
      </div>

    </div>

  </div>
</div>
