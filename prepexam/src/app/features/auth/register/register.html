<div class="onboarding-container">
  <div class="card-wrapper fade-in">
    <div class="header-section text-center">
      <div class="brand-logo-container">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="brand-cap-icon">
          <path d="M22 10v6M2 10l10-5 10 5-10 5z"/>
          <path d="M6 12v5c0 2 2 3 6 3s6-1 6-3v-5"/>
        </svg>
        <span class="brand-name-text">PrepExam</span>
      </div>
      <p class="sub-heading-caption">Your AI-powered exam preparation companion</p>
    </div>

    <div class="login-surface-card">
      <h1 class="portal-main-title">Create Account</h1>
      <p class="portal-sub-title">Join us to start your smart preparation</p>

      <form [formGroup]="registerForm" (ngSubmit)="$event.preventDefault(); handleAction()">
        
        <div class="details-grid-wrapper">
          <div class="form-input-group">
            <label class="field-label-text">FULL NAME</label>
            <input type="text" formControlName="fullName" placeholder="Enter full name" class="standard-text-input" />
          </div>

          <div class="form-input-group">
            <label class="field-label-text">DATE OF BIRTH</label>
            <input type="date" formControlName="dob" class="standard-text-input" />
          </div>

          <div class="form-input-group">
            <label class="field-label-text">EMAIL ADDRESS</label>
            <input type="email" formControlName="email" placeholder="example@domain.com" class="standard-text-input" />
          </div>

          <div class="form-input-group">
            <label class="field-label-text">MOBILE NUMBER</label>
            <div class="mobile-input-row">
              <div class="prefix-country-box">+91</div>
              <input type="tel" formControlName="mobileNumber" placeholder="10–digit number" maxlength="10" class="mobile-text-input" />
            </div>
          </div>

          <div class="form-input-group span-full">
            <label class="field-label-text">ADDRESS</label>
            <input type="text" formControlName="address" placeholder="Enter street address, building, apartment" class="standard-text-input" />
          </div>

          <div class="form-input-group span-full">
            <label class="field-label-text">USERNAME</label>
            <input type="text" formControlName="username" placeholder="Choose a unique username" class="standard-text-input" />
          </div>

          <div class="form-input-group">
            <label class="field-label-text">PASSWORD</label>
            <div class="password-input-container">
              <input 
                [type]="hidePassword ? 'password' : 'text'" 
                formControlName="password" 
                placeholder="••••••••" 
                class="standard-text-input secondary-padding" 
                [class.input-error]="isPasswordInvalidAndTouched"
              />
              <button type="button" class="visibility-toggle-btn" (click)="hidePassword = !hidePassword">
                <span class="view-text-icon">{{ hidePassword ? '👁️' : '🙈' }}</span>
              </button>
            </div>
            <div *ngIf="isPasswordInvalidAndTouched" class="strength-alert-text">
              Must be at least 6 characters with 1 uppercase, 1 lowercase, 1 number, and 1 special char (@$!%*?&).
            </div>
          </div>

          <div class="form-input-group">
            <label class="field-label-text">CONFIRM PASSWORD</label>
            <div class="password-input-container">
              <input 
                [type]="hideConfirmPassword ? 'password' : 'text'" 
                formControlName="confirmPassword" 
                placeholder="••••••••" 
                class="standard-text-input master-padding" 
              />
              
              <div class="status-indicator-wrapper" *ngIf="hasConfirmPasswordValue">
                <span *ngIf="passwordsMatch" class="indicator-icon tick-success">✓</span>
                <span *ngIf="!passwordsMatch" class="indicator-icon cross-error">✕</span>
              </div>

              <button type="button" class="visibility-toggle-btn" (click)="hideConfirmPassword = !hideConfirmPassword">
                <span class="view-text-icon">{{ hideConfirmPassword ? '👁️' : '🙈' }}</span>
              </button>
            </div>
          </div>
        </div>

        <div class="action-footer-wrapper">
          <button
            type="submit"
            class="btn btn-modern-primary full-width"
            [disabled]="registerForm.invalid || !passwordsMatch || isSubmitting"
          >
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="btn-icon-left">
              <circle cx="12" cy="12" r="10"/>
              <polyline points="12 6 12 12 14 14"/>
            </svg>
            <span>{{ isSubmitting ? 'Registering...' : 'Verify & Sign Up' }}</span>
          </button>
        </div>

      </form>

      <div class="alternate-action-footer">
        <span class="alt-label">Already have an account?</span>
        <a routerLink="/login" class="alt-link-anchor">Sign In</a>
      </div>

    </div>
  </div>
</div>
