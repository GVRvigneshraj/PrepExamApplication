<div class="register-page">
  <!-- Progress Steps -->
  <div class="progress-steps">
    <div class="step active">
      <div class="step-circle">
        <span>1</span>
      </div>
      <span class="step-label">Account</span>
    </div>
    <div class="step-line"></div>
    <div class="step">
      <div class="step-circle">
        <span>2</span>
      </div>
      <span class="step-label">Profile</span>
    </div>
    <div class="step-line"></div>
    <div class="step">
      <div class="step-circle">
        <span>3</span>
      </div>
      <span class="step-label">Verify</span>
    </div>
  </div>

  <div class="register-container">
    <div class="step-header">
      <h2>Create your account</h2>
      <p>Start your exam preparation journey today</p>
    </div>

    <!-- Step 1: Account Details -->
    <form class="register-form">
      <!-- Full Name -->
      <div class="form-group">
        <label for="fullName">Full Name</label>
        <div class="input-wrapper">
          <span class="input-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
          </span>
          <input type="text" id="fullName" placeholder="John Doe" />
        </div>
      </div>

      <!-- Email -->
      <div class="form-group">
        <label for="regEmail">Email Address</label>
        <div class="input-wrapper">
          <span class="input-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="4" width="20" height="16" rx="2"/>
              <path d="M22 4L12 13 2 4"/>
            </svg>
          </span>
          <input type="email" id="regEmail" placeholder="you@example.com" />
          <span class="input-suffix success-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#10B981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
          </span>
        </div>
      </div>

      <!-- Phone -->
      <div class="form-group">
        <label for="phone">Phone Number</label>
        <div class="phone-input">
          <div class="country-code">
            <img src="https://flagcdn.com/w40/in.png" alt="IN" class="flag" />
            <span>+91</span>
            <i class="fas fa-chevron-down"></i>
          </div>
          <input type="tel" id="phone" placeholder="9876543210" maxlength="10" />
        </div>
      </div>

      <!-- Password -->
      <div class="form-group">
        <label for="regPassword">Password</label>
        <div class="input-wrapper">
          <span class="input-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </span>
          <input type="password" id="regPassword" placeholder="Create a strong password" />
          <button type="button" class="toggle-btn">
            <i class="fas fa-eye"></i>
          </button>
        </div>
        <!-- Password Strength -->
        <div class="password-strength">
          <div class="strength-bars">
            <div class="bar medium"></div>
            <div class="bar medium"></div>
            <div class="bar"></div>
            <div class="bar"></div>
          </div>
          <span class="strength-text medium">Medium</span>
        </div>
      </div>

      <!-- Confirm Password -->
      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <div class="input-wrapper">
          <span class="input-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </svg>
          </span>
          <input type="password" id="confirmPassword" placeholder="Re-enter your password" />
          <button type="button" class="toggle-btn">
            <i class="fas fa-eye"></i>
          </button>
        </div>
      </div>

      <!-- Terms -->
      <div class="form-group checkbox-group">
        <label class="custom-checkbox">
          <input type="checkbox" />
          <span class="checkmark"></span>
          <span class="checkbox-text">
            I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
          </span>
        </label>
      </div>

      <button type="submit" class="submit-btn">
        <span>Continue</span>
        <i class="fas fa-arrow-right btn-icon"></i>
      </button>
    </form>

    <!-- Login Link -->
    <div class="form-footer">
      <p>Already have an account? <a href="#" class="login-link">Sign In</a></p>
    </div>
  </div>
</div>
