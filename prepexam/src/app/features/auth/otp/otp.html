<div class="otp-page">
  <div class="otp-container">
    <button class="back-btn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      Back
    </button>

    <div class="otp-content">
      <!-- Icon -->
      <div class="otp-icon-wrapper">
        <div class="otp-icon-circle">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#6C5CE7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="4" width="20" height="16" rx="2"/>
            <path d="M22 4L12 13 2 4"/>
          </svg>
        </div>
        <div class="otp-icon-badge">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </div>
      </div>

      <!-- Header -->
      <div class="otp-header">
        <h2>Verify Your Email</h2>
        <p>
          We've sent a 6-digit verification code to<br>
          <strong class="email-highlight">j***n@example.com</strong>
        </p>
      </div>

      <!-- OTP Inputs -->
      <div class="otp-inputs">
        <input type="text" class="otp-input filled" value="4" maxlength="1" inputmode="numeric" readonly />
        <input type="text" class="otp-input filled" value="7" maxlength="1" inputmode="numeric" readonly />
        <input type="text" class="otp-input filled" value="2" maxlength="1" inputmode="numeric" readonly />
        <input type="text" class="otp-input" placeholder="·" maxlength="1" inputmode="numeric" />
        <input type="text" class="otp-input" placeholder="·" maxlength="1" inputmode="numeric" />
        <input type="text" class="otp-input" placeholder="·" maxlength="1" inputmode="numeric" />
      </div>

      <!-- Resend Section -->
      <div class="resend-section">
        <span class="resend-text">
          Resend code in <strong>45s</strong>
        </span>
      </div>

      <!-- Verify Button -->
      <button class="verify-btn">
        <span>Verify Email</span>
      </button>

      <!-- Change Email -->
      <div class="change-email">
        <p>Wrong email? <a href="#">Change email address</a></p>
      </div>
    </div>
  </div>
</div>
