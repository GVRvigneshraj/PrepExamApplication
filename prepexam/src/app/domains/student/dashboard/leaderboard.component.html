<div class="leaderboard-wrapper">

  <div class="table-actions-bar">
    <div class="search-field-container">
      <svg class="search-magnifier" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
      <input
        type="text"
        placeholder="Search player or tier..."
        [ngModel]="searchText()"
        (ngModelChange)="searchText.set($event)">
    </div>
  </div>

  <main class="table-container">
    <div class="pure-table">

      <div class="pure-table-header">
        <div class="cell-rank">Rank</div>
        <div class="cell-player">Player</div>
        <div class="cell-score text-right">Score</div>
      </div>

      <div class="pure-table-body">
        <div *ngIf="filteredPlayers().length === 0" class="empty-row-state">
          No matches found for your criteria.
        </div>

        <div *ngFor="let p of filteredPlayers()" class="pure-table-row">
          <div class="cell-rank">
            <span class="rank-lbl" [ngClass]="`top-${p.rank}`">#{{ p.rank }}</span>
          </div>
          <div class="cell-player">
            <div class="player-identity">
              <span class="player-name" [title]="p.name">{{ p.name }}</span>
              <span class="player-tier-tag" [ngClass]="p.level.toLowerCase()">{{ p.level }}</span>
            </div>
          </div>
          <div class="cell-score text-right highlight-score">
            {{ p.score | number }} <span class="diamond-spark">✦</span>
          </div>
        </div>
      </div>

      <div class="pure-table-footer-sticky">
        <div class="pure-table-row user-self-row">
          <div class="cell-rank">
            <span class="rank-lbl user-self">#{{ currentUser().rank }}</span>
          </div>
          <div class="cell-player">
            <div class="player-identity">
              <span class="player-name" [title]="currentUser().name">
                {{ currentUser().name }} <small class="you-indicator">(You)</small>
              </span>
              <span class="player-tier-tag challenger">{{ currentUser().level }}</span>
            </div>
          </div>
          <div class="cell-score text-right highlight-score">
            {{ currentUser().score | number }} <span class="diamond-spark">✦</span>
          </div>
        </div>
      </div>

    </div>
  </main>

</div>
